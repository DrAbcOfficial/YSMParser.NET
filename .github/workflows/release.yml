name: Build & Release

on:
  push:
    branches: [main]
    tags: [v*]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (overrides auto-detected)'
        required: false
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Extract version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          echo "VERSION_OVERRIDE=$TAG" >> $GITHUB_ENV

      - name: Override version (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: |
          echo "VERSION_OVERRIDE=${{ inputs.version }}" >> $GITHUB_ENV

      - name: Publish CLI
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        run: |
          dotnet publish CLI/YSMParser.CLI.csproj \
            --configuration Release \
            --no-build \
            -p:PublishAot=false \
            --self-contained false \
            -o ./publish

      - name: Pack
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -n "$VERSION_OVERRIDE" ]; then
            dotnet pack --configuration Release --no-build -p:Version="$VERSION_OVERRIDE" -p:PackageVersion="$VERSION_OVERRIDE" -o ./artifacts
          else
            dotnet pack --configuration Release --no-build -o ./artifacts
          fi

      - name: Upload artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Upload CLI
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: cli
          path: ./publish/*
